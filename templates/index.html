<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader - Download Any Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
            width: 20px;
            height: 20px;
        }

        .checkbox-text {
            color: #333;
            font-size: 14px;
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #999;
            position: relative;
            z-index: 1;
        }

        .file-input {
            padding: 12px !important;
            border: 2px dashed #667eea !important;
            background: #f8f9ff;
            cursor: pointer;
        }

        .file-input:hover {
            border-color: #764ba2 !important;
            background: #f0f2ff;
        }

        .select-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .select-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .progress {
            margin-top: 20px;
            display: none;
        }

        .progress-text {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .progress-info {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.5s;
            border-radius: 10px;
        }

        .features {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .features h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            color: #666;
            font-size: 14px;
        }

        .feature-item::before {
            content: "✓";
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: bold;
        }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .download-link:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .feature-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🎬</div>
            <h1>Video Downloader & Image Upscaler</h1>
            <p>Download videos from any website or upscale images to 4K/8K</p>
        </div>

        <form id="downloadForm">
            <div class="input-group">
                <label for="videoUrl">Video URL</label>
                <input 
                    type="text" 
                    id="videoUrl" 
                    name="url" 
                    placeholder="https://example.com/video" 
                    required
                >
            </div>

            <div class="input-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="removeWatermark" name="remove_watermark">
                    <span class="checkbox-text">🎨 Remove watermarks (works on local server only)</span>
                </label>
            </div>

            <button type="submit" class="btn" id="downloadBtn">
                Download Video
            </button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <form id="upscaleForm" enctype="multipart/form-data">
            <div class="input-group">
                <label for="imageFile">Upload Image to Upscale</label>
                <input 
                    type="file" 
                    id="imageFile" 
                    name="image" 
                    accept="image/*"
                    class="file-input"
                >
            </div>

            <div class="input-group">
                <label for="resolution">Target Resolution</label>
                <select id="resolution" name="resolution" class="select-input">
                    <option value="2k">2K (2560x1440)</option>
                    <option value="4k" selected>4K (3840x2160)</option>
                    <option value="8k">8K (7680x4320)</option>
                    <option value="hd">HD (1920x1080)</option>
                </select>
            </div>

            <div class="input-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="enhance" name="enhance" checked>
                    <span class="checkbox-text">✨ Enhance quality (sharpen, denoise, color)</span>
                </label>
            </div>

            <button type="submit" class="btn" id="upscaleBtn">
                Upscale Image
            </button>
        </form>

        <div class="progress" id="progress">
            <p class="progress-text" id="progressText">Processing video...</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-info" id="progressInfo">This may take 2-3 minutes for watermark removal</p>
        </div>

        <div class="status" id="status"></div>

        <div class="features">
            <h3>Features</h3>
            <div class="feature-list">
                <div class="feature-item">High quality downloads</div>
                <div class="feature-item">AI image upscaling</div>
                <div class="feature-item">1000+ sites supported</div>
                <div class="feature-item">2K/4K/8K upscale</div>
                <div class="feature-item">Fast & secure</div>
                <div class="feature-item">Free & open source</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const downloadBtn = document.getElementById('downloadBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = document.getElementById('videoUrl').value;
            const removeWatermark = document.getElementById('removeWatermark').checked;

            if (!url) {
                showStatus('Please enter a video URL', 'error');
                return;
            }

            // Show progress
            downloadBtn.disabled = true;
            downloadBtn.textContent = removeWatermark ? 'Downloading & Removing Watermark...' : 'Downloading...';
            progress.style.display = 'block';
            status.style.display = 'none';

            // Simulate progress updates
            let progressPercent = 0;
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const progressInfo = document.getElementById('progressInfo');
            
            if (removeWatermark) {
                progressText.textContent = 'Step 1: Downloading video...';
                progressInfo.textContent = 'This may take 2-3 minutes for watermark removal';
            } else {
                progressText.textContent = 'Downloading video...';
                progressInfo.textContent = 'Please wait...';
            }
            
            // Simulate progress
            const progressInterval = setInterval(() => {
                if (progressPercent < 90) {
                    progressPercent += Math.random() * 10;
                    if (progressPercent > 90) progressPercent = 90;
                    progressFill.style.width = progressPercent + '%';
                    
                    if (removeWatermark) {
                        if (progressPercent < 30) {
                            progressText.textContent = 'Step 1: Downloading video... ' + Math.floor(progressPercent) + '%';
                        } else if (progressPercent < 90) {
                            progressText.textContent = 'Step 2: Removing watermarks... ' + Math.floor(progressPercent) + '%';
                            progressInfo.textContent = 'Processing frames - please be patient';
                        }
                    } else {
                        progressText.textContent = 'Downloading... ' + Math.floor(progressPercent) + '%';
                    }
                }
            }, 500);

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        url: url,
                        remove_watermark: removeWatermark 
                    }),
                });

                const data = await response.json();
                
                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressText.textContent = 'Complete! 100%';

                if (response.ok) {
                    const message = removeWatermark 
                        ? '✅ Video downloaded & watermark removed! <a href="${data.download_url}" class="download-link">Download File</a>'
                        : '✅ Video downloaded successfully! <a href="${data.download_url}" class="download-link">Download File</a>';
                    showStatus(message.replace('${data.download_url}', data.download_url), 'success');
                } else {
                    showStatus(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                clearInterval(progressInterval);
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = 'Download Video';
                setTimeout(() => {
                    progress.style.display = 'none';
                }, 3000);
            }
        });

        function showStatus(message, type) {
            status.innerHTML = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        // Image upscaler form
        const upscaleForm = document.getElementById('upscaleForm');
        const upscaleBtn = document.getElementById('upscaleBtn');

        upscaleForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('imageFile');
            const resolution = document.getElementById('resolution').value;
            const enhance = document.getElementById('enhance').checked;

            if (!fileInput.files[0]) {
                showStatus('Please select an image file', 'error');
                return;
            }

            // Show progress
            upscaleBtn.disabled = true;
            upscaleBtn.textContent = 'Upscaling Image...';
            progress.style.display = 'block';
            status.style.display = 'none';
            progressText.textContent = 'Upscaling to ' + resolution.toUpperCase() + '...';
            progressInfo.textContent = 'Enhancing quality...';
            progressFill.style.width = '50%';

            // Create form data
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('resolution', resolution);
            formData.append('enhance', enhance);

            try {
                const response = await fetch('/api/upscale', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();
                progressFill.style.width = '100%';
                progressText.textContent = 'Complete! 100%';

                if (response.ok) {
                    showStatus(
                        `✅ Image upscaled to ${resolution.toUpperCase()}! <a href="${data.download_url}" class="download-link">Download Image</a>`,
                        'success'
                    );
                } else {
                    showStatus(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                upscaleBtn.disabled = false;
                upscaleBtn.textContent = 'Upscale Image';
                setTimeout(() => {
                    progress.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
